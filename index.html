<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imprimir</title>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #050505;
            --card-bg: rgba(18, 18, 20, 0.7);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text: #f0f0f0;
            --muted: #888;
            --danger: #ef4444;
            --success: #22c55e;
            --glass-blur: 16px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(34, 197, 94, 0.1) 0%, transparent 50%);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 14px;
            color: var(--muted);
        }

        /* Config banner */
        #config-banner {
            background: rgba(245, 158, 11, 0.05);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            font-family: 'JetBrains Mono', monospace;
        }

        #config-banner p {
            font-size: 11px;
            color: #f59e0b;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        #config-banner input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #f59e0b;
            font-size: 12px;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        #config-banner input:focus {
            border-color: #f59e0b;
        }

        .config-actions {
            display: flex;
            gap: 10px;
        }

        #config-banner button {
            flex: 1;
            background: #f59e0b;
            color: #000;
            border: none;
            font-size: 12px;
            font-weight: 600;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        #config-banner button:active { transform: scale(0.98); }

        #config-banner button.secondary {
            background: transparent;
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.4);
        }

        /* Google Auth Button */
        #authBtn {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        #authBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 255, 255, 0.15);
        }

        #authBtn svg {
            width: 20px;
            height: 20px;
        }

        #authBtn.connected {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: var(--success);
            box-shadow: none;
            cursor: default;
        }

        #authBtn.connected:hover { transform: none; }

        .auth-status {
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .auth-status.connected { color: var(--success); }
        
        .disconnect {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 10px;
            color: var(--muted);
            opacity: 0.5;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.2s;
            z-index: 10;
        }

        .disconnect:hover { 
            color: var(--danger);
            opacity: 1;
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }

        @media (max-width: 400px) or (max-height: 600px) {
            .disconnect {
                top: 12px;
                right: 12px;
            }
        }

        .auth-config-link {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 11px;
            text-decoration: underline;
            text-underline-offset: 3px;
            display: block;
            margin: -16px auto 24px;
        }

        /* Dropzone */
        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
        }

        .dropzone.disabled {
            opacity: 0.2;
            pointer-events: none;
            border-style: solid;
        }

        .dropzone:hover:not(.disabled),
        .dropzone.drag-over {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.05);
            transform: scale(1.01);
        }

        .dropzone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .drop-icon {
            font-size: 32px;
            margin-bottom: 16px;
            display: inline-block;
            background: linear-gradient(135deg, var(--accent) 0%, #818cf8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        .drop-text {
            font-size: 15px;
            font-weight: 400;
            color: var(--text);
            line-height: 1.5;
        }

        .drop-text span {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-top: 8px;
        }

        /* File List */
        .file-list {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-ext {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            color: #fff;
            text-transform: uppercase;
        }

        .file-name {
            flex: 1;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: 12px;
            color: var(--muted);
        }

        .file-remove {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            font-size: 18px;
            transition: color 0.2s;
        }

        .file-remove:hover { color: var(--danger); }

        /* Action Button */
        .send-btn {
            margin-top: 24px;
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px var(--accent-glow);
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px var(--accent-glow);
            filter: brightness(1.1);
        }

        .send-btn:active:not(:disabled) { transform: translateY(0); }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Status & Info */
        .status {
            margin-top: 20px;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }

        .status.loading { color: var(--accent); }
        .status.success { color: var(--success); }
        .status.error { color: var(--danger); }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-info {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .destination {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .limits {
            font-size: 10px;
            color: var(--muted);
            opacity: 0.6;
        }

        /* Responsive Optimization for small screens (350x480) */
        @media (max-width: 400px) or (max-height: 600px) {
            body {
                padding: 16px;
                display: flex;
                flex-direction: column;
                justify-content: flex-start; /* Start from top on small screens to avoid clipping */
                min-height: 100vh;
                height: auto;
            }

            .container {
                padding: 24px 20px;
                border-radius: 24px;
                margin: auto auto; /* Best effort to center if fits, or scroll from top */
                width: 100%;
                max-width: none;
            }

            .header {
                margin-bottom: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .header p {
                font-size: 12px;
            }

            #authBtn {
                padding: 14px;
                font-size: 14px;
                margin-bottom: 8px;
            }

            .auth-status {
                margin-bottom: 16px;
                gap: 4px;
            }

            .auth-config-link {
                margin: -12px auto 16px;
            }

            .dropzone {
                padding: 28px 16px;
                border-radius: 16px;
            }

            .drop-icon {
                font-size: 24px;
                margin-bottom: 12px;
            }

            .drop-icon svg {
                width: 32px;
                height: 32px;
            }

            .drop-text {
                font-size: 13px;
            }

            .drop-text span {
                font-size: 11px;
                margin-top: 4px;
            }

            .file-list {
                margin-top: 16px;
                gap: 8px;
            }

            .file-item {
                padding: 10px 12px;
            }

            .file-name {
                font-size: 13px;
            }

            .send-btn {
                margin-top: 16px;
                padding: 16px;
                font-size: 14px;
            }

            .footer-info {
                margin-top: 24px;
                padding-top: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="header">
            <h1>Imprimir</h1>
            <p>Envía documentos a la impresora del negocio</p>
        </div>

        <!-- Se muestra solo si no hay Client ID guardado -->
        <div id="config-banner" style="display:none">
            <p>Configura tu Google OAuth Client ID.<br>
                console.cloud.google.com → Origen: <strong id="showOrigin" style="color:#fff"></strong></p>
            <input type="text" id="clientIdInput" placeholder="XXXXXXXXXXXX.apps.googleusercontent.com">
            <div class="config-actions">
                <button type="button" onclick="saveClientId()">Guardar</button>
                <button type="button" class="secondary" onclick="clearClientId()">Borrar</button>
            </div>
        </div>

        <button id="authBtn" onclick="startAuth()">
            <svg viewBox="0 0 24 24">
                <path fill="#4285F4"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                <path fill="#EA4335"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Conectar con Google
        </button>

        <div class="auth-status" id="authStatus">
            <span id="authText">No conectado</span>
        </div>
        <button type="button" class="auth-config-link" id="authConfigBtn" onclick="openConfigBanner()">Configurar OAuth</button>

        <div class="dropzone disabled" id="dropzone">
            <input type="file" id="fileInput" multiple accept="*/*" disabled>
            <div class="drop-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
            </div>
            <div class="drop-text">
                Sube tus documentos
                <span>Arrastra archivos o haz clic para seleccionar</span>
            </div>
        </div>

        <div class="file-list" id="fileList"></div>
        <button class="send-btn" id="sendBtn" disabled>Enviar a impresora</button>
        <div class="status" id="status"></div>

        <div class="footer-info">
            <div class="destination">variedadeslg@print.epsonconnect.com</div>
            <div class="limits">Límite Gmail: 25MB total por envío</div>
        </div>
    </div>
    <script>
        // ─── CONFIG ────────────────────────────────────────────────────────────────
        const HARDCODED_CLIENT_ID = ''; // Pega tu Client ID aquí para no pedirlo ni mostrarlo
        const DEST = 'variedadeslg@print.epsonconnect.com';
        const SCOPE = 'https://www.googleapis.com/auth/gmail.send';
        const SK_CID = 'print_client_id';
        const SK_ACCESS = 'print_access_token';
        const SK_EXPIRY = 'print_token_expiry';

        let accessToken = null;
        let tokenClient = null;
        let files = [];

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const sendBtn = document.getElementById('sendBtn');
        const statusEl = document.getElementById('status');
        const authBtn = document.getElementById('authBtn');
        const authStat = document.getElementById('authStatus');
        const authText = document.getElementById('authText');
        const banner = document.getElementById('config-banner');
        const clientIdInput = document.getElementById('clientIdInput');
        const authConfigBtn = document.getElementById('authConfigBtn');

        // ─── UTILS ─────────────────────────────────────────────────────────────────
        function getSavedClientId() { return localStorage.getItem(SK_CID) || ''; }
        function getClientId() { return HARDCODED_CLIENT_ID || getSavedClientId(); }
        function maskClientId(clientId) {
            if (!clientId) return 'sin Client ID';
            if (clientId.length <= 30) return clientId;
            return clientId.slice(0, 12) + '...' + clientId.slice(-18);
        }

        function syncClientConfigUi() {
            if (HARDCODED_CLIENT_ID) {
                if (authConfigBtn) authConfigBtn.style.display = 'none';
                if (clientIdInput) clientIdInput.value = HARDCODED_CLIENT_ID;
                if (banner) banner.style.display = 'none';
                return;
            }
            const saved = getSavedClientId();
            if (clientIdInput) clientIdInput.value = saved;
            if (authConfigBtn) authConfigBtn.textContent = saved ? 'Client ID: ' + maskClientId(saved) : 'Configurar OAuth';
        }

        window.openConfigBanner = function() {
            syncClientConfigUi();
            if (banner) banner.style.display = 'block';
            if (clientIdInput) clientIdInput.focus();
        };

        window.saveClientId = function() {
            if (!clientIdInput) return;
            const val = clientIdInput.value.trim();
            if (!val) return;
            localStorage.setItem(SK_CID, val);
            syncClientConfigUi();
            if (banner) banner.style.display = 'none';
            if (window.google) initGoogleTokenClient();
        };

        window.clearClientId = function() {
            if (HARDCODED_CLIENT_ID) return;
            localStorage.removeItem(SK_CID);
            if (clientIdInput) clientIdInput.value = '';
            syncClientConfigUi();
            if (banner) banner.style.display = 'block';
        };

        // ─── AUTHENTICATION FLOW (GIS Token Client) ────────────────────────────────
        function initGoogleTokenClient() {
            const clientId = getClientId();
            if (!clientId || !window.google) return false;

            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: clientId,
                    scope: SCOPE,
                    callback: handleTokenResponse,
                    error_callback: (err) => {
                        console.error('GIS Error:', err);
                        const msg = (err && err.type === 'popup_closed') 
                            ? 'Ventana emergente cerrada' 
                            : 'Error de Google Workspace';
                        showAuthError(msg);
                    }
                });
                return true;
            } catch (e) {
                console.error('GIS Init Error:', e);
                showAuthError('Error inicializando: ' + e.message);
                return false;
            }
        }

        window.startAuth = function() {
            const clientId = getClientId();
            if (!clientId) {
                openConfigBanner();
                return;
            }

            setAuthLoading();

            if (!window.google) {
                showAuthError('La librería de Google no hs cargado. Verifique su bloqueador de anuncios o conexión.');
                return;
            }

            if (!tokenClient && !initGoogleTokenClient()) return;
            
            try {
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } catch (e) {
                showAuthError('Navegador bloquea ventana de Google');
            }
        };

        function handleTokenResponse(response) {
            if (!response || response.error) {
                const msg = response?.error_description || response?.error || 'Sin respuesta';
                showAuthError('Error de acceso: ' + msg);
                return;
            }
            saveTokens(response);
            onAuthed();
        }

        function saveTokens(data) {
            accessToken = data.access_token;
            localStorage.setItem(SK_ACCESS, data.access_token);
            // Default Google token expiration is generally 3600 seconds
            const validSecs = data.expires_in || 3600;
            localStorage.setItem(SK_EXPIRY, String(Date.now() + (validSecs - 60) * 1000));
        }

        function isTokenValid() {
            const expiry = parseInt(localStorage.getItem(SK_EXPIRY) || '0', 10);
            return expiry > Date.now();
        }

        async function ensureValidToken() {
            if (isTokenValid() && accessToken) return true;
            const stored = localStorage.getItem(SK_ACCESS);
            if (stored && isTokenValid()) {
                accessToken = stored;
                return true;
            }
            return false;
        }

        function clearStoredTokens() {
            localStorage.removeItem(SK_ACCESS);
            localStorage.removeItem(SK_EXPIRY);
            accessToken = null;
        }

        // ─── UI AUTH STATES ────────────────────────────────────────────────────────
        function setAuthLoading() {
            if (authText) authText.textContent = 'Conectando...';
        }

        function onAuthed() {
            if (authBtn) authBtn.style.display = 'none';
            if (authConfigBtn) authConfigBtn.style.display = 'none';
            if (banner) banner.style.display = 'none';

            if (authStat) {
                authStat.className = 'auth-status connected';
                authStat.style.color = '';
            }
            if (authText) authText.textContent = '✓ Sesión activa y lista para enviar';

            const container = document.querySelector('.container');
            if (container && !container.querySelector('.disconnect')) {
                const btn = document.createElement('button');
                btn.className = 'disconnect';
                btn.textContent = 'Cerrar sesión';
                btn.onclick = disconnect;
                container.appendChild(btn);
            }

            if (dropzone) dropzone.classList.remove('disabled');
            if (fileInput) fileInput.disabled = false;
            renderFiles();
        }

        function showAuthError(msg) {
            if (authText) authText.textContent = msg;
            if (authStat) {
                authStat.style.color = 'var(--danger)';
                authStat.className = 'auth-status';
            }
        }

        window.disconnect = function() {
            clearStoredTokens();
            
            if (authBtn) {
                authBtn.style.display = 'flex';
                authBtn.className = '';
                authBtn.onclick = startAuth;
                authBtn.innerHTML = `
                    <svg viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg> Conectar con Google`;
            }
            
            if (authConfigBtn) authConfigBtn.style.display = 'block';
            
            if (authStat) {
                authStat.className = 'auth-status';
                authStat.style.color = '';
            }
            const disc = document.querySelector('.disconnect');
            if (disc) disc.remove();

            if (authText) authText.textContent = 'Sesión cerrada';

            if (dropzone) dropzone.classList.add('disabled');
            if (fileInput) fileInput.disabled = true;
            if (sendBtn) sendBtn.disabled = true;
            files = [];
            if (fileList) fileList.innerHTML = '';
            if (statusEl) statusEl.textContent = '';
        }

        // ─── FILE DRAG AND DROP ────────────────────────────────────────────────────
        if (dropzone) {
            dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
            dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
            dropzone.addEventListener('drop', e => {
                e.preventDefault(); 
                dropzone.classList.remove('drag-over');
                if (dropzone.classList.contains('disabled')) return;
                addFiles([...e.dataTransfer.files]);
            });
        }
        
        if (fileInput) {
            fileInput.addEventListener('change', () => { 
                addFiles([...fileInput.files]); 
                fileInput.value = ''; 
            });
        }

        function addFiles(newFiles) {
            newFiles.forEach(f => { 
                if (!files.find(x => x.name === f.name && x.size === f.size)) {
                    files.push(f); 
                }
            });
            renderFiles();
        }

        window.removeFile = function(i) { 
            files.splice(i, 1); 
            renderFiles(); 
        };

        function formatSize(b) {
            if (b < 1024) return b + ' B';
            if (b < 1048576) return (b / 1024).toFixed(0) + ' KB';
            return (b / 1048576).toFixed(1) + ' MB';
        }

        function getExt(name) { 
            const p = name.lastIndexOf('.'); 
            return p >= 0 ? name.slice(p + 1) : '—'; 
        }

        function renderFiles() {
            if (!fileList) return;
            fileList.innerHTML = '';
            files.forEach((f, i) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <span class="file-ext">${getExt(f.name)}</span>
                    <span class="file-name" title="${f.name}">${f.name}</span>
                    <span class="file-size">${formatSize(f.size)}</span>
                    <button class="file-remove" onclick="removeFile(${i})">×</button>`;
                fileList.appendChild(item);
            });
            if (sendBtn) sendBtn.disabled = files.length === 0 || !accessToken;
            if (statusEl) {
                statusEl.textContent = '';
                statusEl.className = 'status';
            }
        }

        function setStatus(type, msg) {
            if (!statusEl) return;
            statusEl.className = 'status ' + type;
            let icon = '';
            if (type === 'loading') icon = '<span class="spinner"></span>';
            if (type === 'success') icon = '<span style="font-size: 1.2em; margin-right: 8px;">✓</span>';
            if (type === 'error') icon = '<span style="font-size: 1.2em; margin-right: 8px;">✕</span>';
            statusEl.innerHTML = `${icon}${msg}`;
        }

        // ─── GMAIL SEND FUNCTIONALITY ──────────────────────────────────────────────
        function readFileAsBase64(file) {
            return new Promise((res, rej) => {
                const r = new FileReader();
                r.onload = () => res(r.result.split(',')[1]);
                r.onerror = rej;
                r.readAsDataURL(file);
            });
        }

        async function buildMimeMessage(attachments) {
            const boundary = 'dsorak_' + Date.now();
            const nl = '\r\n';
            let raw = [
                `To: ${DEST}`,
                `Subject: `,
                `MIME-Version: 1.0`,
                `Content-Type: multipart/mixed; boundary="${boundary}"`,
                '', `--${boundary}`,
                `Content-Type: text/plain; charset=UTF-8`,
                '', '', ''
            ].join(nl);

            for (const a of attachments) {
                const chunks = a.data.match(/.{1,76}/g) || [a.data];
                raw += [
                    `--${boundary}`,
                    `Content-Type: ${a.mimeType}; name="${a.name}"`,
                    `Content-Disposition: attachment; filename="${a.name}"`,
                    `Content-Transfer-Encoding: base64`,
                    '', chunks.join(nl), ''
                ].join(nl);
            }
            raw += `--${boundary}--`;

            const bytes = new TextEncoder().encode(raw);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary)
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
        }

        if (sendBtn) {
            sendBtn.addEventListener('click', async () => {
                if (!files.length) return;
                sendBtn.disabled = true;
                setStatus('loading', 'Verificando sesión...');

                if (!(await ensureValidToken())) {
                    setStatus('error', '✕ Sesión expirada. Por favor conecte nuevamente.');
                    sendBtn.disabled = false;
                    disconnect();
                    return;
                }

                try {
                    setStatus('loading', 'Preparando archivos (' + files.length + ')...');
                    const attachments = await Promise.all(files.map(async f => ({
                        name: f.name,
                        mimeType: f.type || 'application/octet-stream',
                        data: await readFileAsBase64(f)
                    })));

                    setStatus('loading', 'Enviando a impresión...');
                    const raw = await buildMimeMessage(attachments);

                    const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
                        method: 'POST',
                        headers: { 
                            'Authorization': 'Bearer ' + accessToken, 
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({ raw })
                    });

                    if (res.status === 401) {
                        disconnect();
                        throw new Error('Su sesión de Google ha expirado. Autentíquese de nuevo.');
                    }

                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.error?.message || `Error HTTP ${res.status}`);
                    }

                    setStatus('success', `¡Envío exitoso! Se han enviado ${files.length} archivo${files.length > 1 ? 's' : ''}`);
                    files = [];
                    renderFiles();
                } catch (err) {
                    setStatus('error', '✕ ' + err.message);
                    sendBtn.disabled = false;
                }
            });
        }

        // ─── INITIALIZATION ────────────────────────────────────────────────────────
        window.addEventListener('load', () => {
            const showOriginEl = document.getElementById('showOrigin');
            if (showOriginEl) showOriginEl.textContent = location.origin;
            
            syncClientConfigUi();

            if (!getClientId()) {
                if (banner) banner.style.display = 'block';
            } else {
                // Si el script de Google se ha cargado externamente
                if (window.google) initGoogleTokenClient();
                
                // Si ya tenemos sesión válida en localStorage, restáurala silente
                if (isTokenValid()) {
                    accessToken = localStorage.getItem(SK_ACCESS);
                    onAuthed();
                }
            }
            
            // Si por error queda en la URL código de un flujo viejo por PKCE, limpiarlo
            if (location.search.includes('code=')) {
                history.replaceState(null, '', location.origin + location.pathname);
            }
        });
    </script>
