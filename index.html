<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imprimir</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button type="button" class="disconnect" id="disconnectBtn" hidden>Cerrar sesion</button>

        <div class="header">
            <h1>Imprimir</h1>
            <p>Envia documentos a la impresora del negocio</p>
        </div>

        <button id="authBtn" type="button" title="Conectar con Google">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"></path>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"></path>
            </svg>
            <span>Conectar con Google</span>
        </button>

        <div class="auth-status" id="authStatus">
            <span id="authText">No conectado</span>
        </div>

        <div class="dropzone disabled" id="dropzone">
            <input type="file" id="fileInput" multiple accept="*/*" disabled>
            <div class="drop-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
            </div>
            <div class="drop-text">
                Sube tus documentos
                <span>Arrastra archivos o haz clic para seleccionar</span>
            </div>
        </div>

        <div class="file-list" id="fileList"></div>
        <button class="send-btn" id="sendBtn" type="button" disabled>Enviar a impresora</button>
        <div class="status" id="status"></div>

        <div class="footer-info">
            <div class="destination">variedadeslg@print.epsonconnect.com</div>
            <div class="limits">Limite Gmail: 25MB total por envio</div>
        </div>
    </div>

    <!-- Contenedor para notificaciones -->
    <div id="toast"></div>

    <script src="script.js" defer></script>
</body>
</html>
